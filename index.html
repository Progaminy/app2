<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Central</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, sans-serif; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; padding: 16px; }
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
        #loginScreen h1 { font-size: 50px; }
        #loginScreen input { width: 220px; padding: 14px; background: #111; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 22px; text-align: center; letter-spacing: 6px; text-transform: uppercase; outline: none; }
        #loginScreen button { padding: 14px 40px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .error { color: #ff3366; }
        #mainScreen { display: none; }
        .header { background: #111; padding: 16px; border-radius: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { color: #00ff88; }
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; }
        .card img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 10px; display: flex; justify-content: space-between; }
        .card-time { font-size: 11px; color: #888; }
        .btn-del { background: rgba(255,51,102,0.2); border: none; color: #ff3366; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
        .actions { display: flex; gap: 10px; margin-top: 16px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-danger { background: #ff3366; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #fff; }
        .empty { text-align: center; padding: 60px; color: #555; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal img { max-width: 95%; max-height: 90vh; }
        .modal-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 32px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen">
            <h1>📡</h1>
            <p>Código de Acesso</p>
            <input type="text" id="codeInput" placeholder="MEUCEL1" maxlength="7" autocomplete="off">
            <button onclick="login()">ACESSAR</button>
            <p class="error" id="loginError"></p>
        </div>
        <div id="mainScreen">
            <div class="header">
                <div><h2>📡 CENTRAL</h2><p id="stats"></p></div>
                <button class="btn-del" onclick="logout()">SAIR</button>
            </div>
            <div class="gallery" id="gallery"></div>
            <div class="empty" id="empty"><p>📸 Nenhuma captura</p></div>
            <div class="actions" id="actions" style="display:none;">
                <button class="btn btn-danger" onclick="deleteAll()">🗑 APAGAR TUDO</button>
                <button class="btn btn-outline" onclick="loadCaptures()">🔄 ATUALIZAR</button>
            </div>
        </div>
    </div>
    <div class="modal" id="modal" onclick="closeModal()">
        <span class="modal-close">✕</span>
        <img id="modalImg" src="">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vlkobipdenduyismnkpm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qWeCNdiMyftZ6ZMYDF9u_A_bOplqpiA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SESSION_CODE = 'MEUCEL1';
        let captures = [];
        
        function login() {
            if (document.getElementById('codeInput').value.trim().toUpperCase() === SESSION_CODE) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                loadCaptures();
            }
        }
        function logout() { location.reload(); }
        
        async function loadCaptures() {
            const { data } = await supabase.from('captures').select('*').eq('session_code', SESSION_CODE).order('id', { ascending: false }).limit(50);
            captures = data || [];
            render();
        }
        
        function render() {
            document.getElementById('empty').style.display = captures.length ? 'none' : 'block';
            document.getElementById('actions').style.display = captures.length ? 'flex' : 'none';
            document.getElementById('gallery').innerHTML = captures.map(c => `
                <div class="card"><img src="${c.url}" onclick="openModal('${c.url}')"><div class="card-info"><span class="card-time">${c.time}</span><button class="btn-del" onclick="event.stopPropagation();deleteOne('${c.id}')">🗑</button></div></div>
            `).join('');
            document.getElementById('stats').textContent = captures.length + ' capturas';
        }
        
        async function deleteOne(id) {
            if (!confirm('Apagar?')) return;
            const c = captures.find(x => x.id == id);
            if (c?.storage_path) await supabase.storage.from('captures').remove([c.storage_path]);
            await supabase.from('captures').delete().eq('id', id);
            captures = captures.filter(x => x.id != id);
            render();
        }
        
        async function deleteAll() {
            if (!confirm('TUDO?')) return;
            await supabase.storage.from('captures').remove(captures.map(c => c.storage_path));
            await supabase.from('captures').delete().eq('session_code', SESSION_CODE);
            captures = [];
            render();
        }
        
        function openModal(url) { document.getElementById('modalImg').src = url; document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
    </script>
</body>
</html>
